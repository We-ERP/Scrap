name: Run Scraper Automation

on:
  # السماح بتشغيل السكريبت يدوياً أو عبر واجهة التحكم (API)
  workflow_dispatch:
    inputs:
      target_category:
        description: 'Category to scrape (all, health, small_app, kitchen)'
        required: false
        default: 'all'
        
  # التشغيل التلقائي عند رفع أي تعديلات جديدة على المستودع (اختياري)
  push:
    branches: [ main ]

jobs:
  scrape-job:
    runs-on: ubuntu-latest

    steps:
    # 1. سحب الكود الخاص بك من المستودع
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. تجهيز بيئة بايثون
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: '3.10'

    # 3. تسطيب المكتبات اللازمة لتشغيل الساحب
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # هيحاول يسطب من ملف requirements.txt لو موجود، ولو مش موجود هيسطب المكتبات الأساسية مباشرة
        if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install selenium pandas requests; fi

    # 4. تشغيل الساحب وتمرير القسم المطلوب من لوحة التحكم
    - name: Run Scraper Script
      env:
        # هنا بياخد القسم من الواجهة، ولو مفيش واجهة (زي حالة الـ push) هيعتبره all
        TARGET_CATEGORY: ${{ github.event.inputs.target_category || 'all' }}
      run: python scraper.py