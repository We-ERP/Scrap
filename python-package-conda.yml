name: Run Scraper Automation

on:
  workflow_dispatch:
    inputs:
      target_category:
        description: 'Category to scrape (all, health, small_app, kitchen)'
        required: false
        default: 'all'
        
  push:
    branches: [ main ]

jobs:
  scrape-job:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install selenium pandas requests; fi

    - name: Run Scraper Script
      env:
        TARGET_CATEGORY: ${{ github.event.inputs.target_category || 'all' }}
      run: python scraper.py