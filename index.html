<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scraper Control Panel | لوحة التحكم</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --primary-color: #ffffff;
            --accent-color: #2962ff;
            --text-main: #f5f5f5;
            --text-muted: #a0a0a0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .dashboard-card {
            background-color: var(--surface-color);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
            border: 1px solid #333;
        }
        h2 {
            margin-top: 0;
            color: var(--primary-color);
            text-align: center;
            font-weight: 600;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 14px;
        }
        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background-color: #2c2c2c;
            color: var(--primary-color);
            border: 1px solid #444;
            outline: none;
            font-size: 16px;
            cursor: pointer;
        }
        select:focus {
            border-color: var(--accent-color);
        }
        .btn-run {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-run:hover {
            background-color: #e0e0e0;
            transform: translateY(-2px);
        }
        .status {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
        }
        .success { color: #00e676; }
        .error { color: #ff1744; }
    </style>
</head>
<body>

    <div class="dashboard-card">
        <h2>لوحة تحكم الساحب الذكي 🚀</h2>
        
        <div class="form-group">
            <label>اختر القسم المُراد سحبه:</label>
            <select id="categorySelect">
                <option value="all">سحب كل الأقسام المُحددة</option>
                <option value="health">الصحة والجمال فقط</option>
                <option value="small_app">أجهزة صغيرة فقط</option>
                <option value="kitchen">أجهزة المطبخ فقط</option>
            </select>
        </div>

        <button class="btn-run" onclick="triggerScraper()">▶ تشغيل الاسكريبت الآن</button>
        
        <div id="statusMessage" class="status"></div>
    </div>

    <script>
        // ⚠️ مهم: حط البيانات بتاعتك هنا
        const GITHUB_USER = "YOUR_GITHUB_USERNAME"; // اسم حسابك في جيت هب
        const REPO_NAME = "Scrap"; // اسم المستودع (زي ما في صورتك)
        const WORKFLOW_FILENAME = "scraper.yml"; // اسم ملف الـ workflow بتاعك
        const GITHUB_PAT = "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"; // التوكن الخاص بيك

        async function triggerScraper() {
            const category = document.getElementById("categorySelect").value;
            const statusDiv = document.getElementById("statusMessage");
            
            statusDiv.innerHTML = "⏳ جاري إرسال الأمر لسيرفرات جيت هب...";
            statusDiv.className = "status";

            const url = `https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/actions/workflows/${WORKFLOW_FILENAME}/dispatches`;

            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: {
                        "Accept": "application/vnd.github.v3+json",
                        "Authorization": `token ${GITHUB_PAT}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        ref: "main",
                        inputs: {
                            target_category: category
                        }
                    })
                });

                if (response.ok) {
                    statusDiv.innerHTML = "✅ تم تشغيل الساحب بنجاح! راقب شيت جوجل الخاص بك.";
                    statusDiv.className = "status success";
                } else {
                    const err = await response.json();
                    statusDiv.innerHTML = "❌ حدث خطأ: " + err.message;
                    statusDiv.className = "status error";
                }
            } catch (error) {
                statusDiv.innerHTML = "❌ فشل الاتصال بجيت هب.";
                statusDiv.className = "status error";
            }
        }
    </script>
</body>
</html>
